# Informaes:

    # integratedSecurity: (true) Indica que a conexo ser feita com as credenciais do Windows (false) Credencial so SQL SERVER
    # encrypt: (true) Requer criptografia do Cliente (false) No requer criptografia do Cliente
    # trustServerCertificate: (true)Instrui o aplicativo cliente a ignorar a validao do certificado SSL/TSL do servidor
    # spring.jpa.hibernate.ddl-auto: (none) Banco de dados e tabelas devem ser criadas com antecedncia
    #                                (update) Banco de dados deve ser criado com antecedncia, o cdigo cria as tabelas e a atualiza quando h alterao no cdigo
    #                                atualiza quando h alterao no cdigo
    #                                (create-drop) Banco de dados deve ser criado com antecedncia, o cdigo cria as tabelas
    #                                entretanto quando o servidor  desligado, as tabelas sero excludas
    #                                (create) Banco degit dados deve ser criado com antecedncia, quando o servidor carrega as
    #                                informaes so excludas
