spring.application.name=divulgai
server.port=8080

# URL de conexo para o banco de dados no Somee
spring.datasource.url=jdbc:sqlserver://divulgaibanco.mssql.somee.com:1433;databaseName=divulgaibanco;encrypt=false;trustServerCertificate=true

# Credenciais de acesso ao banco no Somee
spring.datasource.username=divulgaisomee
spring.datasource.password=grupo2sql

# Driver do SQL Server
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Configuraes do JPA e Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false


